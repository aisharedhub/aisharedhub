<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AISharedHub Login</title>
  <meta name="description" content="Login to AISharedHub with Discord." />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg:#0a0712;--color-surface:#110c1d;--color-surface-2:#18112a;--color-border:#2a2142;
      --color-text:#ece9f5;--color-text-muted:#a39cc0;--color-primary:#a855f7;--color-glow:#c084fc;
      --radius-full:9999px;--font-display:'Clash Display','Satoshi',sans-serif;--font-body:'Satoshi',Inter,sans-serif;
      --text-sm:clamp(.875rem,.84rem + .2vw,1rem);--text-base:clamp(1rem,.96rem + .2vw,1.125rem);--text-xl:clamp(1.6rem,1.2rem + 1.2vw,2.3rem);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100dvh;display:grid;place-items:center;padding:1.5rem;font-family:var(--font-body);color:var(--color-text);background:radial-gradient(circle at top left, rgba(168,85,247,.18), transparent 28%),radial-gradient(circle at 85% 15%, rgba(34,211,238,.10), transparent 22%),linear-gradient(180deg,#0a0712 0%,#0d0817 55%,#0a0712 100%)}
    a{text-decoration:none;color:inherit}
    .login-card{width:min(100%,420px);padding:2rem;border-radius:28px;background:linear-gradient(180deg,rgba(24,17,42,.92),rgba(17,12,29,.96));border:1px solid rgba(255,255,255,.08);box-shadow:0 24px 70px rgba(0,0,0,.55);text-align:center}
    .logo{width:52px;height:52px;margin:0 auto 1rem;display:block}
    .brand{font-family:var(--font-display);font-size:1.1rem;font-weight:600;letter-spacing:-.02em;margin-bottom:.75rem}
    .brand span{color:var(--color-glow)}
    h1{font-family:var(--font-display);font-size:var(--text-xl);line-height:1.05;letter-spacing:-.03em;margin-bottom:.75rem}
    p{color:var(--color-text-muted);font-size:var(--text-base);margin-bottom:1.5rem}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.7rem;width:100%;padding:1rem 1.2rem;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:700;background:#5865F2;color:#fff;box-shadow:0 14px 34px rgba(88,101,242,.28);transition:.2s ease}
    .btn:hover{transform:translateY(-2px);background:#4b57df}
    .back{display:inline-block;margin-top:1rem;font-size:var(--text-sm);color:var(--color-text-muted)}
    .back:hover{color:var(--color-text)}
  </style>
</head>
<body>
  <main class="login-card">
    <svg class="logo" viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <defs><linearGradient id="lg" x1="10" y1="10" x2="54" y2="58" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#d8b4fe"></stop><stop offset="0.5" stop-color="#a855f7"></stop><stop offset="1" stop-color="#7c3aed"></stop></linearGradient></defs>
      <path d="M32 6 54.52 19v26L32 58 9.48 45V19L32 6Z" stroke="url(#lg)" stroke-width="2.6" stroke-linejoin="round"></path>
      <path d="M30.45 27.24 Q21.24 18.23 32 13 Q42.76 18.23 33.55 27.24 Z" fill="url(#lg)"></path>
      <path d="M28.65 35.72 Q25.45 48.21 15.55 41.5 Q14.69 29.57 27.11 33.04 Z" fill="url(#lg)"></path>
      <path d="M36.89 33.04 Q49.31 29.57 48.45 41.5 Q38.55 48.21 35.35 35.72 Z" fill="url(#lg)"></path>
      <circle cx="32" cy="32" r="3" fill="#c084fc"></circle>
    </svg>
    <div class="brand">AIShared<span>Hub</span></div>
    <h1>Login with Discord</h1>
    <p>Continue to your account using Discord.</p>
    <a class="btn" href="https://discord.com/oauth2/authorize" target="_blank" rel="noopener noreferrer" aria-label="Continue with Discord OAuth2">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M20.317 4.369A19.791 19.791 0 0 0 15.885 3c-.191.328-.403.769-.554 1.118a18.27 18.27 0 0 0-5.487 0A11.64 11.64 0 0 0 9.289 3a19.736 19.736 0 0 0-4.438 1.372C2.042 8.59 1.282 12.703 1.66 16.757a19.9 19.9 0 0 0 5.328 2.7c.43-.588.814-1.212 1.145-1.868-.629-.238-1.227-.53-1.792-.866.151-.11.299-.226.44-.346 3.457 1.602 7.208 1.602 10.624 0 .142.12.29.236.44.346-.565.337-1.165.629-1.794.867.332.655.716 1.279 1.145 1.867a19.875 19.875 0 0 0 5.33-2.702c.444-4.699-.76-8.775-3.209-12.385ZM8.02 14.228c-1.037 0-1.887-.95-1.887-2.115s.84-2.116 1.887-2.116c1.056 0 1.906.96 1.887 2.116 0 1.165-.84 2.115-1.887 2.115Zm7.96 0c-1.037 0-1.887-.95-1.887-2.115s.84-2.116 1.887-2.116c1.056 0 1.906.96 1.887 2.116 0 1.165-.831 2.115-1.887 2.115Z"/></svg>
      Login with Discord
    </a>
    <a class="back" href="../">Back to site</a>
  </main>
</body>
</html>
